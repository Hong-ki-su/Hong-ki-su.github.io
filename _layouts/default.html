<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>홍기수 - 실습 기록 상세</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- 세련된 Pretendard 폰트 적용 -->
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
  <style>
    body {
      background-color: #f1f3f5; /* 눈이 편안한 배경색 */
      font-family: 'Pretendard', sans-serif;
      color: #333;
      line-height: 1.8;
      word-break: keep-all; /* 한글 단어 끊김 방지 */
    }
    /* 문서가 노션처럼 가운데 예쁘게 모이도록 설정 */
    .markdown-container {
      max-width: 900px;
      margin: 40px auto;
      background: #ffffff;
      padding: 50px 60px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .markdown-container h1 { font-weight: 800; font-size: 2rem; margin-bottom: 1.5rem; color: #111; border-bottom: 3px solid #f1f3f5; padding-bottom: 15px; }
    .markdown-container h2 { font-weight: 700; font-size: 1.5rem; margin-top: 2.5rem; margin-bottom: 1rem; color: #222; }
    .markdown-container h3 { font-weight: 600; font-size: 1.25rem; margin-top: 2rem; margin-bottom: 0.75rem; color: #333; }
    .markdown-container p, .markdown-container li { font-size: 1.05rem; color: #444; }
    .markdown-container li { margin-bottom: 0.5rem; }
    
    /* 코드 블록(회색 박스) 디자인 */
    .markdown-container code { background: #f1f3f5; padding: 3px 6px; border-radius: 4px; color: #d63384; font-size: 0.9em; font-weight: 600; }
    .markdown-container pre { background: #212529; color: #f8f9fa; padding: 20px; border-radius: 8px; overflow-x: auto; margin: 1.5rem 0; }
    .markdown-container pre code { background: transparent; color: inherit; padding: 0; font-weight: normal; }
    
    /* 인용구(>) 디자인 */
    .markdown-container blockquote { border-left: 5px solid #0d6efd; background: #f8f9fa; padding: 15px 20px; margin: 2rem 0; border-radius: 0 8px 8px 0; color: #555; }
    .markdown-container hr { margin: 2.5rem 0; border-color: #e9ecef; }
    
    .back-btn { margin-bottom: 30px; }
    
    /* 모바일 화면 대응 */
    @media (max-width: 768px) {
      .markdown-container { padding: 30px 20px; margin: 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="markdown-container">
      <!-- 상세 페이지로 돌아가는 뒤로가기 버튼 -->
      <a href="javascript:history.back()" class="btn btn-outline-secondary btn-sm back-btn fw-bold">⬅ 목록으로 돌아가기</a>
      
      <!-- 이 자리에 마크다운 내용이 쏙 들어갑니다 -->
      {{ content }}
      
    </div>
  </div>
</body>
</html>
